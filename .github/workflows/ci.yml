name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run tests with coverage
        run: |
          mkdir -p .coverage
          go test -v -coverprofile=.coverage/coverage.out ./...

      - name: Display coverage
        run: go tool cover -func=.coverage/coverage.out

      - name: Check coverage threshold
        run: |
          # Extrae el porcentaje total de cobertura
          COVERAGE=$(go tool cover -func=.coverage/coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          
          # Umbral mínimo definido en AGENTS.md
          THRESHOLD=90.0
          
          # Comparación usando awk para manejar decimales
          IS_LOW=$(echo "$COVERAGE $THRESHOLD" | awk '{if ($1 < $2) print "true"; else print "false"}')
          
          if [ "$IS_LOW" = "true" ]; then
            echo "❌ Error: La cobertura de tests ($COVERAGE%) es inferior al 90% requerido."
            exit 1
          else
            echo "✅ Cobertura suficiente: $COVERAGE%"
          fi
